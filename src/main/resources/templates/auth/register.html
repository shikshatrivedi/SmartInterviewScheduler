<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — Smart Interview Scheduler</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-card" style="max-width:520px;">
        <div class="auth-logo">
            <div class="logo-icon">🗓️</div>
            <h1>Create Account</h1>
            <p>Join Smart Interview Scheduler</p>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger">
            <span>⚠️</span>
            <span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post">
            <div class="form-grid">
                <div class="form-group form-full">
                    <label class="form-label">Full Name *</label>
                    <input type="text" th:field="*{fullName}" class="form-control"
                           placeholder="John Doe" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="form-group form-full">
                    <label class="form-label">Email Address *</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="you@example.com" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           placeholder="Min. 6 characters" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Register As *</label>
                    <select th:field="*{role}" class="form-control form-select" required>
                        <option value="">-- Select Role --</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                    <div class="form-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" th:field="*{phoneNumber}" class="form-control"
                           placeholder="+91 9876543210"/>
                </div>

                <div class="form-group">
                    <label class="form-label">Department</label>
                    <input type="text" th:field="*{department}" class="form-control"
                           placeholder="Engineering"/>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg"
                    style="width:100%; margin-top:8px;">Create Account →</button>
        </form>

        <p style="text-align:center; margin-top:16px; font-size:.85rem; color:var(--text-secondary);">
            Already have an account?
            <a th:href="@{/auth/login}" style="font-weight:600;">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
