<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Users — Smart Interview Scheduler</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <div class="brand-icon">🗓️</div>
                <div class="brand-text"><h2>Smart Scheduler</h2><span>Enterprise Platform</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-title">Admin Panel</div>
            <a th:href="@{/admin/dashboard}" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a th:href="@{/admin/users}" class="nav-item active"><span class="nav-icon">👥</span> Manage Users</a>
            <a th:href="@{/admin/interviews}" class="nav-item"><span class="nav-icon">📋</span> All Interviews</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <div class="user-name" sec:authentication="name">Admin</div>
                    <div class="user-role">Administrator</div>
                </div>
                <a th:href="@{/auth/logout}" class="logout-btn">⏻</a>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <header class="top-header">
            <div class="header-title">
                <h1>User Management</h1>
                <p>Create, manage and control system users</p>
            </div>
            <button class="btn btn-primary" onclick="document.getElementById('createModal').classList.add('open')">
                ➕ Create User
            </button>
        </header>

        <div class="page-body">
            <div th:if="${successMsg}" class="alert alert-success">✅ <span th:text="${successMsg}"></span></div>
            <div th:if="${errorMsg}"   class="alert alert-danger">⚠️ <span th:text="${errorMsg}"></span></div>

            <div class="card">
                <div class="card-header">
                    <h3>All System Users</h3>
                    <span class="badge badge-primary" th:text="${users.size()} + ' users'"></span>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th><th>Name</th><th>Email</th><th>Role</th>
                                <th>Department</th><th>Status</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}"></td>
                                <td>
                                    <div class="fw-600" th:text="${u.fullName}"></div>
                                    <div class="text-sm text-muted" th:text="${u.phoneNumber ?: '—'}"></div>
                                </td>
                                <td th:text="${u.email}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${u.role.name() == 'ADMIN'} ? 'badge-danger' :
                                                          (${u.role.name() == 'HR'} ? 'badge-info' :
                                                          (${u.role.name() == 'INTERVIEWER'} ? 'badge-primary' : 'badge-success'))"
                                          th:text="${u.role}"></span>
                                </td>
                                <td th:text="${u.department ?: '—'}"></td>
                                <td>
                                    <span class="badge" th:classappend="${u.enabled} ? 'badge-success' : 'badge-danger'"
                                          th:text="${u.enabled ? 'Active' : 'Disabled'}"></span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post"
                                          style="display:inline;">
                                        <button type="submit" class="btn btn-outline btn-sm"
                                                th:text="${u.enabled ? 'Disable' : 'Enable'}"></button>
                                    </form>
                                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                                          style="display:inline;"
                                          onsubmit="return confirm('Delete this user?')">
                                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create User Modal -->
<div class="modal-overlay" id="createModal">
    <div class="modal">
        <div class="modal-header">
            <h3>➕ Create New User</h3>
            <button class="modal-close" onclick="document.getElementById('createModal').classList.remove('open')">✕</button>
        </div>
        <div class="modal-body">
            <form th:action="@{/admin/users/create}" th:object="${registerDTO}" method="post">
                <div class="form-grid">
                    <div class="form-group form-full">
                        <label class="form-label">Full Name *</label>
                        <input type="text" th:field="*{fullName}" class="form-control" placeholder="Full Name" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="user@company.com" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password *</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 chars" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role *</label>
                        <select th:field="*{role}" class="form-control form-select" required>
                            <option value="">-- Select --</option>
                            <option th:each="r : ${allRoles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <input type="text" th:field="*{department}" class="form-control" placeholder="Dept"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" th:field="*{phoneNumber}" class="form-control" placeholder="+91..."/>
                    </div>
                </div>
                <div class="modal-footer" style="padding:0; margin-top:16px;">
                    <button type="button" class="btn btn-outline"
                            onclick="document.getElementById('createModal').classList.remove('open')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
