<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Interviews — Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <div class="brand-icon">🗓️</div>
                <div class="brand-text"><h2>Smart Scheduler</h2><span>Enterprise Platform</span></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-title">Admin Panel</div>
            <a th:href="@{/admin/dashboard}" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a th:href="@{/admin/users}" class="nav-item"><span class="nav-icon">👥</span> Manage Users</a>
            <a th:href="@{/admin/interviews}" class="nav-item active"><span class="nav-icon">📋</span> All Interviews</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <div class="user-name" sec:authentication="name">Admin</div>
                    <div class="user-role">Administrator</div>
                </div>
                <a th:href="@{/auth/logout}" class="logout-btn">⏻</a>
            </div>
        </div>
    </aside>
    <div class="main-content">
        <header class="top-header">
            <div class="header-title">
                <h1>All Interviews</h1>
                <p>Complete interview pipeline across all HR</p>
            </div>
        </header>
        <div class="page-body">
            <div class="card">
                <div class="card-header">
                    <h3>📋 Interview Pipeline</h3>
                    <span class="badge badge-primary" th:text="${interviews.size()} + ' total'"></span>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th><th>Candidate</th><th>Job</th><th>Interviewer</th>
                                <th>Date</th><th>Slot</th><th>Status</th><th>Feedback</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(interviews)}">
                                <td colspan="8"><div class="empty-state"><div class="empty-icon">📭</div><h3>No interviews yet</h3></div></td>
                            </tr>
                            <tr th:each="iv : ${interviews}">
                                <td th:text="${iv.id}"></td>
                                <td>
                                    <div class="fw-600" th:text="${iv.candidate.fullName}"></div>
                                    <div class="text-sm text-muted" th:text="${iv.candidate.email}"></div>
                                </td>
                                <td>
                                    <div th:text="${iv.job.title}"></div>
                                    <div class="text-sm text-muted" th:text="${iv.job.department}"></div>
                                </td>
                                <td th:text="${iv.interviewer.fullName}"></td>
                                <td th:text="${iv.availability.availableDate}"></td>
                                <td th:text="${iv.availability.startTime} + ' - ' + ${iv.availability.endTime}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${iv.status.name() == 'SCHEDULED'} ? 'badge-primary' : (${iv.status.name() == 'COMPLETED'} ? 'badge-success' : (${iv.status.name() == 'CANCELLED'} ? 'badge-danger' : 'badge-warning'))"
                                          th:text="${iv.status}"></span>
                                </td>
                                <td>
                                    <span th:if="${iv.feedback != null}" class="badge badge-success" th:text="${iv.feedback.result}"></span>
                                    <span th:if="${iv.feedback == null}" class="text-muted text-sm">—</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
